name: Workflow

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  prettier-format-check:
    name: Format Check
    uses: SnakeDoc/yodel/.github/workflows/prettier-format-check.yaml@1bdda9a73f86797a35de15ee6ebf55d049c3a5e5 # main

  markdown-lint-check:
    name: Lint Check
    uses: SnakeDoc/yodel/.github/workflows/markdown-lint-check.yaml@1bdda9a73f86797a35de15ee6ebf55d049c3a5e5 # main

  gleam-format-check:
    name: Format Check
    uses: SnakeDoc/yodel/.github/workflows/gleam-format-check.yaml@1bdda9a73f86797a35de15ee6ebf55d049c3a5e5 # main

  gleam-tests:
    name: Tests
    needs: [prettier-format-check, markdown-lint-check, gleam-format-check]
    uses: SnakeDoc/yodel/.github/workflows/gleam-tests.yaml@1bdda9a73f86797a35de15ee6ebf55d049c3a5e5 # main
