name: Workflow

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  prettier-format-check:
    name: Format Check
    uses: SnakeDoc/yodel/.github/workflows/prettier-format-check.yaml@866801d6373deb4c280e7c4f3ede354961583f82 # main

  markdown-lint-check:
    name: Lint Check
    uses: SnakeDoc/yodel/.github/workflows/markdown-lint-check.yaml@866801d6373deb4c280e7c4f3ede354961583f82 # main

  gleam-format-check:
    name: Format Check
    uses: SnakeDoc/yodel/.github/workflows/gleam-format-check.yaml@866801d6373deb4c280e7c4f3ede354961583f82 # main

  gleam-tests:
    name: Tests
    needs: [prettier-format-check, markdown-lint-check, gleam-format-check]
    uses: SnakeDoc/yodel/.github/workflows/gleam-tests.yaml@866801d6373deb4c280e7c4f3ede354961583f82 # main
