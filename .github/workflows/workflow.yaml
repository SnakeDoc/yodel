name: Workflow

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  prettier-format-check:
    name: Format Check
    uses: SnakeDoc/yodel/.github/workflows/prettier-format-check.yaml@26bf341b4753e67e5e22b28612ac70463b3a9ed1 # main

  markdown-lint-check:
    name: Lint Check
    uses: SnakeDoc/yodel/.github/workflows/markdown-lint-check.yaml@26bf341b4753e67e5e22b28612ac70463b3a9ed1 # main

  gleam-format-check:
    name: Format Check
    uses: SnakeDoc/yodel/.github/workflows/gleam-format-check.yaml@26bf341b4753e67e5e22b28612ac70463b3a9ed1 # main

  gleam-tests:
    name: Tests
    needs: [prettier-format-check, markdown-lint-check, gleam-format-check]
    uses: SnakeDoc/yodel/.github/workflows/gleam-tests.yaml@26bf341b4753e67e5e22b28612ac70463b3a9ed1 # main
