name: Gleam
description: Check Gleam Formatting

on:
  workflow_call:
    inputs:
      check-path:
        required: false
        type: string
        default: "."

jobs:
  format:
    name: Gleam
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup BEAM Environment
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Check Source Formatting
        run: gleam format --check ${{ inputs.check-path }}
