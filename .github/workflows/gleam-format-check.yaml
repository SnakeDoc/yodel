name: Gleam
description: Check Gleam Formatting

on:
  workflow_call:
    inputs:
      check-path:
        required: false
        type: string
        default: "."

jobs:
  format:
    name: Gleam
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup BEAM Environment
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Check Source Formatting
        run: gleam format --check ${{ inputs.check-path }}
